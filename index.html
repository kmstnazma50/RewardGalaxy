    }

    .triggers-grid {

      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .level-btn i {
      font-size: 0.75rem;

    }

    .level-btn:hover {

    }

    .level-btn.active {

    }

    .level-btn.active i {

    }

    .hero {

    }

      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;

      justify-content: center;
    }

    .hero h1 i {

      color: #fcd9b6;

    }

    }

    .total-number {

      font-weight: 800;
      color: #fb923c;

      letter-spacing: 2px;

    }

    .legend {
      display: flex;
      gap: 20px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2d3a5e;
    }

    .dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #34d399;
    }

    .section-title {

      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem 0;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(249, 115, 22, 0.5);

    .section-title i {

      color: #fb923c;
    }

    .section-title h2 {

      font-weight: 700;
      color: #fee3c0;
    }

    .badge {

      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0a0a1a;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 8px;
    }

    .btn-grid::-webkit-scrollbar {
      width: 6px;
    }
    .btn-grid::-webkit-scrollbar-track {
      background: #1e253e;
      border-radius: 10px;
    }
    .btn-grid::-webkit-scrollbar-thumb {
      background: #fb923c;
      border-radius: 10px;
    }

    .offer-btn {
      background: linear-gradient(105deg, #13182e, #0c1022);
      border: 1px solid #3b3f66;
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;

      font-weight: 600;

    .offer-btn:hover {

      background: linear-gradient(105deg, #1c2340, #12172e);
      border-color: #fb923c;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);

    .offer-btn.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
      background: linear-gradient(105deg, #1a2a1a, #0f1f0f);
      border-color: #4a6a4a;
      transform: none;

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }
    .btn-left i {
      font-size: 1.2rem;
      color: #fb923c;
      min-width: 28px;
      text-align: center;
    }
    .btn-left span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .click-count {
      background: #00000055;
      border-radius: 40px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fdba74;
      border: 0.5px solid #fb923c;
      font-family: monospace;
    }
    .offer-btn.clicked {
      background: linear-gradient(105deg, #0f3b2a, #0a261c);
      border-color: #10b981;

    .offer-btn.clicked .click-count {

      color: #facc15;

    .reset-btn {

      border: 1px solid #f97316;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fdba74;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn:hover {
      background: #f9731630;
      color: #ffffff;
      border-color: #fb923c;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; }
      .level-sidebar { display: none; }
      .mobile-tier-bar {
        display: block;
        background: rgba(15, 20, 35, 0.85);
        backdrop-filter: blur(16px);
        border-radius: 1.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(251, 146, 60, 0.5);
      }
      .mobile-tier-bar h3 {
        color: #ffd6a5;
        font-size: 1rem;
        text-align: center;
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .mobile-triggers {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .mobile-tier-btn {
        background: linear-gradient(105deg, #1a1e32, #11152a);
        border: 1px solid #fb923c;
        border-radius: 60px;
        padding: 6px 0;
        font-weight: 700;
        font-size: 0.65rem;
        color: #ffdead;
        cursor: pointer;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mobile-tier-btn i { font-size: 0.65rem; color: #fb923c; }
      .mobile-tier-btn.active {
        background: linear-gradient(105deg, #ea580c, #c2410c);
        border-color: #fdba74;
        color: white;
      }
      .btn-grid { max-height: 45vh; }
      .stats-card { margin-top: 1.5rem; }
    }
    @media (min-width: 851px) {
      .mobile-tier-bar { display: none; }
    }
  </style>
</head>
<body>

<script>
  // ==================== 30 NEW LINKS (disintegratehesitate.com) ====================
  const ALL_LINKS = [

    "https://disintegratehesitate.com/r8px3xbh?key=f3ada1bcfea6f9efa38b86e67c81f0be",
    "https://disintegratehesitate.com/q4wf1ay17?key=d73d13d5c6e744275ff2781c37bc6719",
    "https://disintegratehesitate.com/fyzbdns491?key=a905addd9b7000fced4f14b8b4b34e2e",
    "https://disintegratehesitate.com/bk5jrw1eb?key=613c56d52e2311b824d2c846ef3193f1",
    "https://disintegratehesitate.com/fgxvarebj?key=223d7fe40844ff7828f559b3521723bc",
    "https://disintegratehesitate.com/aixz60k6y3?key=b5fcf64bc61d6e78e3bfc8871e0eeab1",
    "https://disintegratehesitate.com/rp0f5f5iw?key=dc9953c90c0895c0c564af9798be29f6",
    "https://disintegratehesitate.com/fukprnux?key=459775ceaaa73d237ac95f32d9ede9e6",
    "https://disintegratehesitate.com/qk58pp8wqx?key=983596d36a114dd963558816b81e3df2",
    "https://disintegratehesitate.com/r651ze8r?key=b75b22edd36a14e20caf5d62a2f526cd",
    "https://disintegratehesitate.com/feab77j4k?key=c5f74f89d2d30de0f963ffa18b55b80a",
    "https://disintegratehesitate.com/fmr9k95g?key=621ee17936cb686e22f2aaddd2867fa1",
    "https://disintegratehesitate.com/qc2sge66?key=e5dc0cbd7a5e4cd5fdd804f97b8eaab9",
    "https://disintegratehesitate.com/v13i98f6f?key=a37bf89be962dd4f51d288b205e3d203",
    "https://disintegratehesitate.com/dv69mzg54?key=800852d727686fde99999a39c28d41a2",
    "https://disintegratehesitate.com/csa8r63y?key=200e87bf2ec312d95d593bc94c00b6d5",
    "https://disintegratehesitate.com/f7rpjf6f?key=6f522d49acfaeec0530e0d00b5d4ae56",
    "https://disintegratehesitate.com/t7tx7bhay?key=ddb95803479bcce79fda3a977d19f28f",
    "https://disintegratehesitate.com/m9mzuvpvf8?key=56debe608f2b533b3eaf9e7823703881"
  ];

  // ========== USER-FRIENDLY & AD-COMPLIANT OFFER NAMES (30 unique, gentle and clear) ==========
  const OFFER_NAMES = [
    "🌟 Daily Galaxy Gift", "🎁 Simple Bonus Pack", "💎 Easy Reward Gem", "⚡ Quick Access Pass", "🍀 Lucky Galaxy Token",
    "🏆 Friendly Milestone", "🚀 Smooth Boost Voucher", "🎯 Clear Bonus Target", "🔑 Gentle Vault Key", "📀 Basic Digital Pack",
    "🕹️ Casual Gamer Perk", "🎧 Calm Audio Reward", "📱 Light Mobile Bonus", "💡 Bright Daily Deal", "🛡️ Cozy Secure Plus",
    "📚 Warm Insider Pass", "🎨 Kind Creator Kit", "⚙️ Simple Utility Perk", "🔔 Soft Flash Alert", "🌐 Gentle Web Access",
    "🧩 Friendly Mystery Tile", "🎵 Peaceful Sound Pack", "📸 Easy Snapshot", "🕶️ Quiet Stealth Perk", "🌿 Pure Lucky Clover",
    "🧭 Kind Navigator Bonus", "🎲 Simple Dice Reward", "🃏 Gentle Wild Card", "🎈 Soft Celebration Pack", "⭐ Pure Galaxy Bonus"
  ];

  // Matching icons for each offer
  const OFFER_ICONS = [
    "star", "gift", "gem", "bolt", "leaf", "trophy", "rocket", "bullseye", "key", "database",
    "gamepad", "headphones", "mobile-alt", "lightbulb", "shield-alt", "book", "palette", "cogs", "bell", "globe",
    "puzzle-piece", "music", "camera", "sunglasses", "leaf", "compass", "dice-d6", "star-of-life", "balloon", "crown"
  ];

  // Shuffle array utility (Fisher-Yates) for unique order per user
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Get persistent shuffled order for this user
  function getShuffledIndices() {
    const ORDER_KEY = "rewardGalaxyShuffledOrderV1";
    const saved = localStorage.getItem(ORDER_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.length === 30) return parsed;
    }
    const indices = Array.from({ length: 30 }, (_, i) => i);
    shuffleArray(indices);
    localStorage.setItem(ORDER_KEY, JSON.stringify(indices));
    return indices;
  }

  const shuffledOrder = getShuffledIndices();

  // Build tier offers using shuffled order (3 per tier)
  const TIER_OFFERS = {};
  for (let tier = 1; tier <= 10; tier++) {
    TIER_OFFERS[tier] = [];
    for (let j = 0; j < 3; j++) {
      const globalIdx = shuffledOrder[(tier - 1) * 3 + j];
      TIER_OFFERS[tier].push({
        name: OFFER_NAMES[globalIdx % OFFER_NAMES.length],
        icon: OFFER_ICONS[globalIdx % OFFER_ICONS.length],
        link: ALL_LINKS[globalIdx],
        originalIndex: globalIdx
      });
    }
  }

  const TOTAL_OFFERS = 30;
  let clickCounts = new Array(TOTAL_OFFERS).fill(0);
  let claimedStatus = new Array(TOTAL_OFFERS).fill(false);
  const STORAGE_KEY = "rewardGalaxyClicksV1";
  const CLAIMED_KEY = "rewardGalaxyClaimedV1";

  function loadCounts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        let arr = JSON.parse(saved);
        if (arr.length === TOTAL_OFFERS) clickCounts = arr;
      } catch(e) {}
    }
    const savedClaimed = localStorage.getItem(CLAIMED_KEY);
    if (savedClaimed) {
      try {
        let arr = JSON.parse(savedClaimed);
        if (arr.length === TOTAL_OFFERS) claimedStatus = arr;
      } catch(e) {}
    }
  }
  function saveCounts() { 
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clickCounts));
    localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimedStatus));
  }
  function updateTotalDisplay() {
    const total = clickCounts.reduce((a,b)=>a+b,0);
    document.getElementById("totalClicks").innerText = total;
  }

  let currentTier = 1;

  function renderCurrentTier() {
    const grid = document.getElementById("offersGrid");
    grid.innerHTML = "";
    const offers = TIER_OFFERS[currentTier];
    const tierNames = ["Starter Pack", "Bronze Tier", "Silver Tier", "Gold Tier", "Platinum Tier", "Emerald Tier", "Ruby Tier", "Sapphire Tier", "Diamond Tier", "Ultimate Vault"];
    const levelTitle = document.getElementById("levelName");
    const levelBadge = document.getElementById("levelBadge");
    levelTitle.innerText = `Tier ${currentTier} · ${tierNames[currentTier-1]}`;
    levelBadge.innerText = "3 Offers";

    offers.forEach((offer) => {
      const globalIdx = offer.originalIndex;
      const count = clickCounts[globalIdx];
      const isClaimed = claimedStatus[globalIdx];
      const hasClick = count > 0;
      
      const btn = document.createElement("a");
      if (!isClaimed) {
        btn.href = offer.link;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
      } else {
        btn.href = "javascript:void(0);";
      }
      btn.className = `offer-btn ${hasClick ? "clicked" : ""} ${isClaimed ? "disabled" : ""}`;
      btn.setAttribute("data-global", globalIdx);
      
      btn.innerHTML = `<div class="btn-left"><i class="fas fa-${offer.icon}"></i><span>${offer.name}</span></div><div class="click-count">${count}</div>`;
      
      if (!isClaimed) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (claimedStatus[globalIdx]) return false;
          
          // One-time claim: mark claimed and increment
          claimedStatus[globalIdx] = true;
          clickCounts[globalIdx] += 1;
          saveCounts();
          updateTotalDisplay();
          renderCurrentTier();  // re-render to disable this button
          
          // Open link in new tab
          window.open(offer.link, "_blank");
          return false;
        });
      } else {
        btn.style.cursor = "not-allowed";
        btn.onclick = (e) => { e.preventDefault(); return false; };
      }
      
      grid.appendChild(btn);
    });
  }

  function setActiveTier(tier) {
    currentTier = tier;
    document.querySelectorAll(".level-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    document.querySelectorAll(".mobile-tier-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    renderCurrentTier();
  }

  function resetCounters() {
    for (let i = 0; i < TOTAL_OFFERS; i++) {
      clickCounts[i] = 0;
      claimedStatus[i] = false;
    }
    saveCounts();
    updateTotalDisplay();
    renderCurrentTier();
  }

  function buildTriggers() {
    const desktopContainer = document.getElementById("desktopTriggers");
    const mobileContainer = document.getElementById("mobileTriggers");
    desktopContainer.innerHTML = "";
    mobileContainer.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const dBtn = document.createElement("div");
      dBtn.className = "level-btn";
      dBtn.setAttribute("data-level", i);
      dBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      dBtn.addEventListener("click", () => setActiveTier(i));
      desktopContainer.appendChild(dBtn);
      const mBtn = document.createElement("div");
      mBtn.className = "mobile-tier-btn";
      mBtn.setAttribute("data-level", i);
      mBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      mBtn.addEventListener("click", () => setActiveTier(i));
      mobileContainer.appendChild(mBtn);
    }
  }

  document.getElementById("resetAllBtn").addEventListener("click", resetCounters);
  loadCounts();
  buildTriggers();
  setActiveTier(1);
  updateTotalDisplay();
</script>
</body>
</html>
